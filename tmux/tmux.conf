# ~/.config/tmux/tmux.conf — standalone config (self-authored, no framework)
# Theme: tokyonight-night, to match nvim. Flat / borderless. Palette:
#   bg #1a1b26 · fg #c0caf5 · dim #565f89 · gutter #3b4261
#   blue #7aa2f7 · cyan #7dcfff · magenta #bb9af7 · green #9ece6a
#   yellow #e0af68 · red #f7768e

# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"        # truecolor

set -g escape-time 0                       # no delay after Esc (was 1 under oh-my-tmux)
set -g focus-events on
set -g history-limit 10000
set -g display-time 1000
set -g base-index 1                        # windows start at 1
set -g pane-base-index 1                   # panes start at 1
set -g renumber-windows on
set -g automatic-rename off                # keep window names we type (don't let shell rename)
set -g allow-rename off
set -g set-clipboard on
set -g mouse on
set -g mode-keys vi
set -g status-keys vi

# -- prefix (C-b -> C-a) -------------------------------------------------------

set -gu prefix2
unbind C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- reload / edit config ------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf sourced"
bind e new-window -n "tmux.conf" "\${EDITOR:-vim} ~/.config/tmux/tmux.conf && tmux source-file ~/.config/tmux/tmux.conf && tmux display 'tmux.conf sourced'"

# -- splits & windows (keep current path) --------------------------------------

bind - split-window -v -c "#{pane_current_path}"   # pane below
bind _ split-window -h -c "#{pane_current_path}"   # pane right
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c command-prompt -p "window name:" "new-window -c '#{pane_current_path}' -n '%%'"

# -- pane navigation (vi + arrows) ---------------------------------------------

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r Left  select-pane -L
bind -r Down  select-pane -D
bind -r Up    select-pane -U
bind -r Right select-pane -R

# -- pane resize ---------------------------------------------------------------

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2
bind -r C-Left  resize-pane -L
bind -r C-Down  resize-pane -D
bind -r C-Up    resize-pane -U
bind -r C-Right resize-pane -R
bind -r M-Left  resize-pane -L 5
bind -r M-Down  resize-pane -D 5
bind -r M-Up    resize-pane -U 5
bind -r M-Right resize-pane -R 5

# -- pane / window management --------------------------------------------------

bind + resize-pane -Z                      # zoom (also stock: z)
bind -r < swap-pane -U
bind -r > swap-pane -D
bind BTab switch-client -l                 # last client
bind C-c command-prompt -p "session name:" "new-session -s '%%'"
bind C-f command-prompt -p find-session "switch-client -t %%"

# session / window search: tmux built-in choose-tree (stock bindings)
bind s choose-tree -Zs
bind w choose-tree -Zw
bind m set -g mouse \; display "mouse #{?mouse,on,off}"

# clear screen + scrollback (no prefix, matches oh-my-tmux)
bind -n C-l send-keys C-l \; run-shell "sleep 0.1" \; clear-history

# -- copy mode (vi + macOS clipboard) ------------------------------------------

bind Enter copy-mode
bind ] paste-buffer -p
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# -- theme: panes, windows, messages -------------------------------------------

# panes: inactive border blends into bg (invisible); active is a faint gutter
# gray, turning yellow in copy-mode and red when panes are synchronized.
set -g pane-border-style "fg=#1a1b26"
set -g pane-active-border-style "#{?pane_in_mode,fg=#e0af68,#{?pane_synchronized,fg=#f7768e,fg=#3b4261}}"

set -g message-style "fg=#1a1b26,bg=#7aa2f7,bold"
set -g mode-style    "fg=#1a1b26,bg=#7aa2f7,bold"

set -g clock-mode-colour "#7aa2f7"
set -g clock-mode-style 24

# windows: flat, no blocks. ○ inactive (dim) · ● active (blue).
#  = Nerd Font zoom glyph (U+F065),  = bell (U+F0F3) — swap if they tofu.
set -g window-status-separator "  "
set -g window-status-format         "#[fg=#565f89]○ #W#{?window_zoomed_flag, ,}#{?window_bell_flag, ,}"
set -g window-status-current-format "#[fg=#7aa2f7,bold]● #W#{?window_zoomed_flag, ,}#{?window_bell_flag, ,}"
set -g window-status-activity-style "fg=#e0af68"
set -g window-status-bell-style     "fg=#f7768e,bold"

# -- theme: status bar (flat: bg=default blends into the terminal) -------------

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 10
set -g status-style "fg=#a9b1d6,bg=default"
set -g status-left-length 100
set -g status-right-length 150

# left: session —  Nerd Font server glyph (U+F473) + name, in magenta
set -g status-left "#[fg=#bb9af7,bold]  #S   "

# right: indicators (prefix ⌨ / mouse ↗ / sync ⚏) · battery% · time · date
# battery digits come from tmux-battery.sh; the % is a doubled literal (%%) so
# tmux's strftime on the status string doesn't eat it. all fields fixed-width.
set -g status-right "#[fg=#565f89]#{?client_prefix,⌨ ,}#{?mouse,↗ ,}#{?pane_synchronized,⚏ ,}#[fg=#9ece6a]#(~/.config/tmux/tmux-battery.sh)%%   #[fg=#7dcfff]%R   #[fg=#565f89]%d %b "

# -- logging -------------------------------------------------------------------

run 'mkdir -p ~/.tmux/logs'
set-hook -g after-new-session 'pipe-pane -o "~/.config/tmux/log-clean.sh ~/.tmux/logs/#{session_name}.log"'
set-hook -g after-new-window  'pipe-pane -o "~/.config/tmux/log-clean.sh ~/.tmux/logs/#{session_name}-w#{window_index}.log"'
set-hook -g after-split-window 'pipe-pane -o "~/.config/tmux/log-clean.sh ~/.tmux/logs/#{session_name}-w#{window_index}-p#{pane_index}.log"'
